name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: List files
        run: find . -name "gradlew" 2>/dev/null && ls -la

      - name: Grant execute permission
        run: find . -name "gradlew" -exec chmod +x {} \;

      - name: Build Debug APK
        run: |
          GRADLEW=$(find . -name "gradlew" | head -1)
          DIR=$(dirname $GRADLEW)
          cd $DIR && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MotionSMS-Gateway-APK
          path: "**/outputs/apk/debug/*.apk"
          retention-days: 30
