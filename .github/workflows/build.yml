name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x MotionSMS_Build/gradlew

      - name: Build Debug APK
        run: cd MotionSMS_Build && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MotionSMS-Gateway-APK
          path: MotionSMS_Build/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
